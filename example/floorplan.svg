<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f5f0e8"/>

  <!-- Outer walls -->
  <rect x="40" y="30" width="720" height="440" fill="none" stroke="#333" stroke-width="4"/>

  <!-- Room dividers -->
  <!-- Horizontal -->
  <line x1="40" y1="220" x2="400" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="500" y1="220" x2="760" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="40" y1="350" x2="300" y2="350" stroke="#333" stroke-width="3"/>

  <!-- Vertical -->
  <line x1="300" y1="220" x2="300" y2="470" stroke="#333" stroke-width="3"/>
  <line x1="500" y1="30" x2="500" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="550" y1="220" x2="550" y2="470" stroke="#333" stroke-width="3"/>

  <!-- Doors (gaps) -->
  <rect x="395" y="216" width="110" height="8" fill="#f5f0e8"/>
  <rect x="296" y="345" width="8" height="50" fill="#f5f0e8"/>
  <rect x="496" y="100" width="8" height="60" fill="#f5f0e8"/>
  <rect x="546" y="320" width="8" height="60" fill="#f5f0e8"/>

  <!-- Room labels (top-left corner of each area) -->
  <text x="50" y="48" font-family="Arial" font-size="14" fill="#666" text-anchor="start">Warehouse A</text>
  <text x="510" y="48" font-family="Arial" font-size="14" fill="#666" text-anchor="start">Warehouse B</text>
  <text x="50" y="238" font-family="Arial" font-size="13" fill="#666" text-anchor="start">Loading Dock</text>
  <text x="310" y="238" font-family="Arial" font-size="13" fill="#666" text-anchor="start">Corridor</text>
  <text x="560" y="238" font-family="Arial" font-size="13" fill="#666" text-anchor="start">Office</text>
  <text x="50" y="368" font-family="Arial" font-size="13" fill="#666" text-anchor="start">Storage</text>
  <text x="310" y="368" font-family="Arial" font-size="13" fill="#666" text-anchor="start">Break Room</text>

  <!-- Shelving racks (Warehouse A) -->
  <rect x="80" y="60" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="80" y="85" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="80" y="110" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="80" y="155" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="80" y="180" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>

  <rect x="280" y="60" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="280" y="85" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="280" y="110" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="280" y="155" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="280" y="180" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>

  <!-- Shelving racks (Warehouse B) -->
  <rect x="540" y="60" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="540" y="85" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="540" y="110" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="540" y="155" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>
  <rect x="540" y="180" width="100" height="15" fill="#ccc" stroke="#999" stroke-width="1"/>

  <!-- Tables (Break Room) -->
  <circle cx="380" cy="400" r="18" fill="none" stroke="#999" stroke-width="1.5"/>
  <circle cx="450" cy="400" r="18" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Desk (Office) -->
  <rect x="600" y="260" width="80" height="40" fill="none" stroke="#999" stroke-width="1.5" rx="3"/>
  <rect x="700" y="270" width="30" height="60" fill="none" stroke="#999" stroke-width="1.5" rx="3"/>
</svg>
